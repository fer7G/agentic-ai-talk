server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Same-origin relative /api/* calls from the SPA get forwarded to the
    # backend container over the Compose network — mirrors what Vite's dev
    # proxy does, so the frontend code needs no per-environment config.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri /index.html;
    }
}
